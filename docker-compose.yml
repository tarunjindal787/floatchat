version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: floatchat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-floatchat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-floatchat_secret}
      POSTGRES_DB: ${POSTGRES_DB:-argo_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-floatchat}"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.3
    container_name: floatchat_chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER: ""
      ANONYMIZED_TELEMETRY: "false"

  streamlit:
    build: .
    container_name: floatchat_app
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql://floatchat:floatchat_secret@postgres:5432/argo_db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    command: streamlit run frontend/app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  postgres_data:
  chroma_data:
